<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoFlix - Canais ao Vivo</title>
<link rel="icon" href="/favicon.png" type="image/png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  :root { --bg-dark:#020617; --accent:#dc2626; }
  body { background:var(--bg-dark); color:#f8fafc; font-family:'Inter',sans-serif; }
  .channel-card { background:#0f172a; border:1px solid #1e293b; transition:transform .15s, border-color .15s; }
  .channel-card:hover { transform:translateY(-2px); border-color:var(--accent); }
  .group-pill { background:#1e293b; }
  .group-pill.active { background:var(--accent); color:#fff; }
  details > summary { list-style:none; cursor:pointer; }
  details > summary::-webkit-details-marker { display:none; }
  #playerModal { backdrop-filter: blur(6px); }
  .scroll-x::-webkit-scrollbar { height:6px; }
  .scroll-x::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }
</style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header class="sticky top-0 z-40 bg-slate-950/90 backdrop-blur border-b border-slate-800">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
    <h1 class="text-2xl font-black tracking-tight">
      <span class="text-red-600">No</span>Flix
    </h1>
    <div class="ml-auto flex-1 max-w-md relative">
      <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
      <input id="search" type="text" placeholder="Buscar canal..."
        class="w-full bg-slate-900 border border-slate-800 rounded-full pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-red-600">
    </div>
  </div>
  <!-- Group filter -->
  <div id="groups" class="max-w-7xl mx-auto px-4 pb-3 flex gap-2 overflow-x-auto scroll-x"></div>
</header>

<!-- Main -->
<main class="max-w-7xl mx-auto px-4 py-6">
  <div id="status" class="text-center text-slate-400 py-12">
    <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
    <p>Carregando canais do Dropbox...</p>
  </div>
  <div id="channels" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
  <p id="count" class="text-center text-slate-500 text-xs mt-8"></p>
</main>

<!-- Player modal -->
<div id="playerModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
  <div class="bg-slate-900 rounded-xl overflow-hidden w-full max-w-4xl shadow-2xl">
    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800">
      <h2 id="playerTitle" class="font-bold truncate"></h2>
      <button id="closePlayer" class="text-slate-400 hover:text-white text-xl px-2"><i class="fas fa-times"></i></button>
    </div>
    <video id="video" class="w-full aspect-video bg-black" controls autoplay playsinline></video>
    <p class="text-xs text-slate-500 px-4 py-2">Se o canal não tocar, o stream pode estar offline ou bloqueado pelo navegador (CORS / HTTP).</p>
  </div>
</div>

<script>
const PLAYLIST_URL = "https://dl.dropbox.com/scl/fi/eejtn3vqwjpvw0iwmb52j/tv.txt?rlkey=jcnbloi8ddfezbp5ksoaypzhd&dl=1";

let allChannels = [];
let currentGroup = "Todos";
let currentSearch = "";
let hls = null;

function parseM3U(text) {
  const lines = text.split(/\r?\n/);
  const out = [];
  let cur = null;
  for (const line of lines) {
    if (line.startsWith("#EXTINF")) {
      const name = line.split(",").slice(1).join(",").trim();
      const logo = (line.match(/tvg-logo="([^"]*)"/) || [,""])[1];
      const group = (line.match(/group-title="([^"]*)"/) || [,"Outros"])[1] || "Outros";
      cur = { name, logo, group };
    } else if (line && !line.startsWith("#") && cur) {
      cur.url = line.trim();
      out.push(cur);
      cur = null;
    }
  }
  return out;
}

function render() {
  const container = document.getElementById("channels");
  const filtered = allChannels.filter(c => {
    const okGroup = currentGroup === "Todos" || c.group === currentGroup;
    const okSearch = !currentSearch || c.name.toLowerCase().includes(currentSearch);
    return okGroup && okSearch;
  });
  container.innerHTML = filtered.map((c, i) => `
    <button data-idx="${allChannels.indexOf(c)}" class="channel-card rounded-lg p-3 flex flex-col items-center text-center gap-2">
      ${c.logo
        ? `<img src="${c.logo}" alt="" class="w-14 h-14 object-contain" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="w-14 h-14 rounded bg-slate-800 hidden items-center justify-center text-red-600"><i class="fas fa-tv text-xl"></i></div>`
        : `<div class="w-14 h-14 rounded bg-slate-800 flex items-center justify-center text-red-600"><i class="fas fa-tv text-xl"></i></div>`
      }
      <span class="text-xs font-semibold line-clamp-2">${c.name}</span>
      <span class="text-[10px] text-slate-500">${c.group}</span>
    </button>
  `).join("");
  document.getElementById("count").textContent = `${filtered.length} de ${allChannels.length} canais`;
}

function renderGroups() {
  const groups = ["Todos", ...Array.from(new Set(allChannels.map(c => c.group))).sort()];
  document.getElementById("groups").innerHTML = groups.map(g => `
    <button data-group="${g}" class="group-pill ${g===currentGroup?'active':''} whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full">${g}</button>
  `).join("");
}

function play(channel) {
  document.getElementById("playerTitle").textContent = channel.name;
  const modal = document.getElementById("playerModal");
  const video = document.getElementById("video");
  modal.classList.remove("hidden");
  modal.classList.add("flex");

  if (hls) { hls.destroy(); hls = null; }
  const url = channel.url;

  if (url.endsWith(".m3u8") || url.includes(".m3u8")) {
    if (window.Hls && Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
    } else {
      video.src = url;
    }
  } else {
    // streams .ts ou diretos — tenta hls.js mesmo assim, senão fallback
    if (window.Hls && Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.ERROR, () => { video.src = url; });
    } else {
      video.src = url;
    }
  }
  video.play().catch(()=>{});
}

function closePlayer() {
  const modal = document.getElementById("playerModal");
  const video = document.getElementById("video");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
  video.pause(); video.removeAttribute("src"); video.load();
  if (hls) { hls.destroy(); hls = null; }
}

// Events
document.getElementById("search").addEventListener("input", e => {
  currentSearch = e.target.value.toLowerCase().trim();
  render();
});
document.getElementById("groups").addEventListener("click", e => {
  const btn = e.target.closest("[data-group]");
  if (!btn) return;
  currentGroup = btn.dataset.group;
  renderGroups(); render();
});
document.getElementById("channels").addEventListener("click", e => {
  const btn = e.target.closest("[data-idx]");
  if (!btn) return;
  play(allChannels[+btn.dataset.idx]);
});
document.getElementById("closePlayer").addEventListener("click", closePlayer);
document.getElementById("playerModal").addEventListener("click", e => {
  if (e.target.id === "playerModal") closePlayer();
});

// Load
fetch(PLAYLIST_URL)
  .then(r => r.text())
  .then(txt => {
    allChannels = parseM3U(txt);
    document.getElementById("status").classList.add("hidden");
    renderGroups();
    render();
  })
  .catch(err => {
    document.getElementById("status").innerHTML =
      `<p class="text-red-500">Erro ao carregar a playlist: ${err.message}</p>`;
  });
</script>
</body>
</html>
